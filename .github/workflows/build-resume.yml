name: Build resume

on:
  push:
    branches: [main, master]
    paths:
      - "resume/resume.json"
      - "resume/shell.template.html"
      - "scripts/build_resume.py"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate index.html
        run: python scripts/build_resume.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html."
          else
            git commit -m "chore: regenerate index.html from resume/resume.json"
            git push
          fi
